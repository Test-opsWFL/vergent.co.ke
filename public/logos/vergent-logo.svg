<!--
  Vergent Technology Solutions logo.

  PLACEHOLDER — geometric approximation of the swirl mark + wordmark
  while we await the real brand SVG. Replace this file with the official
  asset (same filename) and the site will pick it up automatically on
  next build.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 200" role="img" aria-label="Vergent Technology Solutions">
  <defs>
    <linearGradient id="vrg-blade" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"  stop-color="#E11D74"/>
      <stop offset="55%" stop-color="#F0518A"/>
      <stop offset="100%" stop-color="#F5821F"/>
    </linearGradient>
  </defs>

  <!-- Swirl mark — 5 blades, 72° apart -->
  <g transform="translate(100,100)">
    <g fill="url(#vrg-blade)">
      <path d="M 0 -78 Q 55 -70 70 -20 Q 48 12 6 -8 Q -10 -48 0 -78 Z"/>
      <path transform="rotate(72)"  d="M 0 -78 Q 55 -70 70 -20 Q 48 12 6 -8 Q -10 -48 0 -78 Z"/>
      <path transform="rotate(144)" d="M 0 -78 Q 55 -70 70 -20 Q 48 12 6 -8 Q -10 -48 0 -78 Z"/>
      <path transform="rotate(216)" d="M 0 -78 Q 55 -70 70 -20 Q 48 12 6 -8 Q -10 -48 0 -78 Z"/>
      <path transform="rotate(288)" d="M 0 -78 Q 55 -70 70 -20 Q 48 12 6 -8 Q -10 -48 0 -78 Z"/>
    </g>
  </g>

  <!-- Wordmark -->
  <text
    x="200" y="118"
    font-family="Geist, Inter, system-ui, sans-serif"
    font-size="92"
    font-weight="800"
    letter-spacing="-3"
    fill="#0B0E14"
  >Vergent</text>

  <!-- Tagline -->
  <text
    x="200" y="155"
    font-family="Geist, Inter, system-ui, sans-serif"
    font-size="22"
    font-weight="600"
    letter-spacing="2"
    fill="#F5821F"
  >Technology Solutions</text>
</svg>
